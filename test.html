<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama 本地模型测试工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        dark: '#1e1b4b',
                        light: '#f5f3ff'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <h1 class="text-3xl font-bold text-center text-primary mb-6">Ollama 本地模型测试工具</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- 左侧配置面板 -->
            <div class="lg:col-span-1 space-y-6">
                <!-- 服务配置 -->
                <div class="bg-white rounded-lg shadow-md p-5">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">服务配置</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ollama 服务地址</label>
                            <div class="flex gap-2">
                                <input type="text" id="ollama-url" value="http://localhost:11434" 
                                    class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary">
                                <button id="refresh-models" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition">
                                    刷新模型
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">选择模型</label>
                            <select id="model-select" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary">
                                <option value="">加载中...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 系统提示词 -->
                <div class="bg-white rounded-lg shadow-md p-5">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">系统提示词</h2>
                    <textarea id="system-prompt" rows="4" placeholder="输入系统提示词..."
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary resize-none"></textarea>
                </div>

                <!-- 生成参数 -->
                <div class="bg-white rounded-lg shadow-md p-5">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">生成参数</h2>
                    <div class="space-y-5">
                        <!-- Temperature -->
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">Temperature (温度)</label>
                                <span id="temp-value" class="text-sm text-gray-500">0.7</span>
                            </div>
                            <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                            <p class="text-xs text-gray-500 mt-1">值越低越严谨，越高越有创意</p>
                        </div>

                        <!-- Top P -->
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">Top P (核采样)</label>
                                <span id="topp-value" class="text-sm text-gray-500">0.9</span>
                            </div>
                            <input type="range" id="top-p" min="0" max="1" step="0.05" value="0.9"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                            <p class="text-xs text-gray-500 mt-1">控制输出多样性，0.9较保守</p>
                        </div>

                        <!-- Top K -->
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">Top K (候选词数)</label>
                                <span id="topk-value" class="text-sm text-gray-500">40</span>
                            </div>
                            <input type="range" id="top-k" min="0" max="100" step="1" value="40"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                            <p class="text-xs text-gray-500 mt-1">限制只考虑概率最高的K个词</p>
                        </div>

                        <!-- Max Tokens -->
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">最大生成 Token</label>
                                <span id="maxtokens-value" class="text-sm text-gray-500">2048</span>
                            </div>
                            <input type="range" id="max-tokens" min="128" max="8192" step="128" value="2048"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                        </div>

                        <!-- Repeat Penalty -->
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-sm font-medium text-gray-700">重复惩罚</label>
                                <span id="repeatpenalty-value" class="text-sm text-gray-500">1.1</span>
                            </div>
                            <input type="range" id="repeat-penalty" min="1" max="2" step="0.05" value="1.1"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                            <p class="text-xs text-gray-500 mt-1">值越高越不容易重复</p>
                        </div>

                        <!-- Seed -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">随机种子 (可选)</label>
                            <input type="number" id="seed" placeholder="留空使用随机种子"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary">
                            <p class="text-xs text-gray-500 mt-1">固定种子可重现相同输出</p>
                        </div>

                        <!-- 重置按钮 -->
                        <button id="reset-params" class="w-full px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">
                            重置为默认参数
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右侧对话区域 -->
            <div class="lg:col-span-3 flex flex-col h-[calc(100vh-120px)]">
                <!-- 对话历史 -->
                <div id="chat-container" class="flex-1 bg-white rounded-lg shadow-md p-4 overflow-y-auto mb-4 space-y-4">
                    <div class="text-center text-gray-500 py-10">
                        <svg class="w-16 h-16 mx-auto mb-4 text-primary/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                        </svg>
                        <p class="text-lg">开始与本地 AI 对话</p>
                        <p class="text-sm mt-2">选择模型后，在下方输入框中输入问题</p>
                    </div>
                </div>

                <!-- 输入区域 -->
                <div class="bg-white rounded-lg shadow-md p-4">
                    <div class="flex gap-3">
                        <textarea id="user-input" rows="3" placeholder="输入你的问题..."
                            class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary resize-none"></textarea>
                        <div class="flex flex-col gap-2">
                            <button id="send-btn" class="flex-1 px-6 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition font-medium">
                                发送
                            </button>
                            <button id="stop-btn" class="px-6 py-2 bg-red-500 text-white rounded-md hover:bg-red-600 transition font-medium hidden">
                                停止
                            </button>
                            <button id="clear-btn" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">
                                清空
                            </button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-3 text-sm text-gray-500">
                        <div id="status-text">就绪</div>
                        <div>
                            <span id="response-time"></span>
                            <span id="token-count" class="ml-4"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let chatHistory = [];
        let isGenerating = false;
        let abortController = null;

        // DOM 元素
        const ollamaUrlInput = document.getElementById('ollama-url');
        const modelSelect = document.getElementById('model-select');
        const refreshModelsBtn = document.getElementById('refresh-models');
        const systemPromptInput = document.getElementById('system-prompt');
        const temperatureSlider = document.getElementById('temperature');
        const topPSlider = document.getElementById('top-p');
        const topKSlider = document.getElementById('top-k');
        const maxTokensSlider = document.getElementById('max-tokens');
        const repeatPenaltySlider = document.getElementById('repeat-penalty');
        const seedInput = document.getElementById('seed');
        const resetParamsBtn = document.getElementById('reset-params');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const stopBtn = document.getElementById('stop-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusText = document.getElementById('status-text');
        const responseTimeText = document.getElementById('response-time');
        const tokenCountText = document.getElementById('token-count');

        // 参数值显示元素
        const tempValue = document.getElementById('temp-value');
        const toppValue = document.getElementById('topp-value');
        const topkValue = document.getElementById('topk-value');
        const maxtokensValue = document.getElementById('maxtokens-value');
        const repeatpenaltyValue = document.getElementById('repeatpenalty-value');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadModels();
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            // 刷新模型
            refreshModelsBtn.addEventListener('click', loadModels);

            // 参数滑块更新显示
            temperatureSlider.addEventListener('input', () => tempValue.textContent = temperatureSlider.value);
            topPSlider.addEventListener('input', () => toppValue.textContent = topPSlider.value);
            topKSlider.addEventListener('input', () => topkValue.textContent = topKSlider.value);
            maxTokensSlider.addEventListener('input', () => maxtokensValue.textContent = maxTokensSlider.value);
            repeatPenaltySlider.addEventListener('input', () => repeatpenaltyValue.textContent = repeatPenaltySlider.value);

            // 重置参数
            resetParamsBtn.addEventListener('click', resetParameters);

            // 发送消息
            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // 停止生成
            stopBtn.addEventListener('click', stopGeneration);

            // 清空对话
            clearBtn.addEventListener('click', clearChat);
        }

        // 加载可用模型
        async function loadModels() {
            const baseUrl = ollamaUrlInput.value.trim();
            if (!baseUrl) {
                alert('请输入 Ollama 服务地址');
                return;
            }

            modelSelect.innerHTML = '<option value="">加载中...</option>';
            statusText.textContent = '正在加载模型列表...';

            try {
                const response = await fetch(`${baseUrl}/api/tags`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                modelSelect.innerHTML = '';
                if (data.models && data.models.length > 0) {
                    data.models.forEach(model => {
                        const option = document.createElement('option');
                        option.value = model.name;
                        option.textContent = `${model.name} (${formatBytes(model.size)})`;
                        modelSelect.appendChild(option);
                    });
                    statusText.textContent = `已加载 ${data.models.length} 个模型`;
                } else {
                    modelSelect.innerHTML = '<option value="">没有找到模型</option>';
                    statusText.textContent = '没有找到已安装的模型';
                }
            } catch (error) {
                console.error('加载模型失败:', error);
                modelSelect.innerHTML = '<option value="">加载失败</option>';
                statusText.textContent = '连接 Ollama 服务失败，请检查服务是否运行';
                alert(`无法连接到 Ollama 服务: ${error.message}\n请确保 Ollama 正在运行，并且地址正确。`);
            }
        }

        // 格式化字节大小
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // 重置参数为默认值
        function resetParameters() {
            temperatureSlider.value = 0.7;
            topPSlider.value = 0.9;
            topKSlider.value = 40;
            maxTokensSlider.value = 2048;
            repeatPenaltySlider.value = 1.1;
            seedInput.value = '';

            // 更新显示
            tempValue.textContent = '0.7';
            toppValue.textContent = '0.9';
            topkValue.textContent = '40';
            maxtokensValue.textContent = '2048';
            repeatpenaltyValue.textContent = '1.1';
        }

        // 发送消息
        async function sendMessage() {
            const message = userInput.value.trim();
            const model = modelSelect.value;
            const baseUrl = ollamaUrlInput.value.trim();

            if (!message) {
                alert('请输入问题');
                return;
            }

            if (!model) {
                alert('请选择模型');
                return;
            }

            if (!baseUrl) {
                alert('请输入 Ollama 服务地址');
                return;
            }

            if (isGenerating) {
                return;
            }

            // 清空输入框
            userInput.value = '';

            // 添加用户消息到对话
            addMessage('user', message);

            // 准备请求数据
            const messages = [...chatHistory];
            
            // 添加系统提示词
            const systemPrompt = systemPromptInput.value.trim();
            if (systemPrompt) {
                messages.unshift({ role: 'system', content: systemPrompt });
            }

            // 准备生成参数
            const options = {
                temperature: parseFloat(temperatureSlider.value),
                top_p: parseFloat(topPSlider.value),
                top_k: parseInt(topKSlider.value),
                num_predict: parseInt(maxTokensSlider.value),
                repeat_penalty: parseFloat(repeatPenaltySlider.value)
            };

            // 添加种子（如果有）
            const seed = seedInput.value.trim();
            if (seed) {
                options.seed = parseInt(seed);
            }

            // 开始生成
            isGenerating = true;
            sendBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            statusText.textContent = '正在生成...';
            responseTimeText.textContent = '';
            tokenCountText.textContent = '';

            // 添加空的助手消息
            const assistantMessageElement = addMessage('assistant', '');
            let fullResponse = '';
            const startTime = Date.now();

            try {
                abortController = new AbortController();
                
                const response = await fetch(`${baseUrl}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: messages,
                        stream: true,
                        options: options
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');

                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            if (data.message && data.message.content) {
                                fullResponse += data.message.content;
                                assistantMessageElement.querySelector('.message-content').textContent = fullResponse;
                                // 滚动到底部
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }

                            if (data.done) {
                                // 记录统计信息
                                const endTime = Date.now();
                                const responseTime = ((endTime - startTime) / 1000).toFixed(2);
                                const totalTokens = data.eval_count || 0;
                                const tokensPerSecond = totalTokens > 0 ? (totalTokens / (responseTime)).toFixed(2) : 0;

                                responseTimeText.textContent = `响应时间: ${responseTime}s`;
                                tokenCountText.textContent = `生成 Token: ${totalTokens} (${tokensPerSecond} token/s)`;

                                // 添加到聊天历史
                                chatHistory.push({ role: 'assistant', content: fullResponse });
                            }
                        } catch (e) {
                            console.error('解析响应失败:', e, line);
                        }
                    }
                }

                statusText.textContent = '生成完成';
            } catch (error) {
                if (error.name === 'AbortError') {
                    assistantMessageElement.querySelector('.message-content').textContent += '\n\n[已停止生成]';
                    statusText.textContent = '已停止生成';
                } else {
                    console.error('发送消息失败:', error);
                    assistantMessageElement.querySelector('.message-content').textContent = `错误: ${error.message}`;
                    statusText.textContent = '生成失败';
                }
            } finally {
                isGenerating = false;
                sendBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                abortController = null;
            }
        }

        // 停止生成
        function stopGeneration() {
            if (abortController) {
                abortController.abort();
            }
        }

        // 清空对话
        function clearChat() {
            chatHistory = [];
            chatContainer.innerHTML = `
                <div class="text-center text-gray-500 py-10">
                    <svg class="w-16 h-16 mx-auto mb-4 text-primary/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                    </svg>
                    <p class="text-lg">开始与本地 AI 对话</p>
                    <p class="text-sm mt-2">选择模型后，在下方输入框中输入问题</p>
                </div>
            `;
            responseTimeText.textContent = '';
            tokenCountText.textContent = '';
            statusText.textContent = '对话已清空';
        }

        // 添加消息到对话
        function addMessage(role, content) {
            if (role === 'user') {
                chatHistory.push({ role: 'user', content: content });
            }

            // 移除初始提示
            const initialPrompt = chatContainer.querySelector('.text-center.text-gray-500.py-10');
            if (initialPrompt) {
                initialPrompt.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const messageBubble = document.createElement('div');
            messageBubble.className = `max-w-3xl px-4 py-3 rounded-lg ${
                role === 'user' 
                    ? 'bg-primary text-white rounded-br-none' 
                    : 'bg-gray-100 text-gray-800 rounded-bl-none'
            }`;

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content whitespace-pre-wrap';
            messageContent.textContent = content;

            // 添加复制按钮
            if (role === 'assistant') {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'mt-2 text-xs text-gray-500 hover:text-gray-700 transition';
                copyBtn.textContent = '复制';
                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(messageContent.textContent).then(() => {
                        copyBtn.textContent = '已复制';
                        setTimeout(() => copyBtn.textContent = '复制', 2000);
                    });
                });
                messageBubble.appendChild(messageContent);
                messageBubble.appendChild(copyBtn);
            } else {
                messageBubble.appendChild(messageContent);
            }

            messageDiv.appendChild(messageBubble);
            chatContainer.appendChild(messageDiv);
            
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv;
        }
    </script>
</body>
</html>
